name: Check for n8n Updates and Sync to Hugging Face Space

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest stable n8n version
        id: get_version
        run: |
          # Try GitHub API first
          LATEST_TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/n8n-io/n8n/releases/latest" | \
            grep -o '"tag_name":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          # Fallback to npm if GitHub API fails
          if [ -z "$LATEST_TAG" ]; then
            LATEST_VERSION=$(curl -fsSL https://registry.npmjs.org/n8n/latest | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Latest stable n8n version from npm is: $LATEST_VERSION"
            echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          else
            LATEST_VERSION=$(echo "$LATEST_TAG" | sed 's/^n8n@//')
            echo "Latest stable n8n version from GitHub is: $LATEST_VERSION"
            echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          fi
          
          if [ -z "$LATEST_VERSION" ]; then
            echo "::error::Failed to get latest n8n version"
            exit 1
          fi

      - name: Check if latest version is blacklisted
        id: check_blacklist
        run: |
          LATEST_VERSION="${{ steps.get_version.outputs.version }}"
          BLOCKLIST_FILE="version-blocklist.txt"
          
          if [ ! -f "$BLOCKLIST_FILE" ]; then
            echo "is_blacklisted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          IS_BLACKLISTED=false
          while IFS= read -r line || [ -n "$line" ]; do
            VERSION=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$VERSION" ] && continue
            if [ "$VERSION" = "$LATEST_VERSION" ]; then
              IS_BLACKLISTED=true
              break
            fi
          done < "$BLOCKLIST_FILE"
          
          echo "is_blacklisted=$IS_BLACKLISTED" >> "$GITHUB_OUTPUT"

      - name: Get current version from Dockerfile
        id: get_current_version
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "::error::Dockerfile not found"
            exit 1
          fi
          
          # More robust version extraction
          CURRENT_VERSION=$(grep -E 'n8nio/n8n:[0-9.]+' Dockerfile | head -1 | sed -E 's/.*n8nio\/n8n:([0-9.]+).*/\1/')
          
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::Could not extract version from Dockerfile"
            exit 1
          fi
          
          echo "Current version in Dockerfile is: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compare versions and update Dockerfile
        id: update_dockerfile
        if: steps.check_blacklist.outputs.is_blacklisted != 'true' && steps.get_version.outputs.version != steps.get_current_version.outputs.version
        run: |
          LATEST="${{ steps.get_version.outputs.version }}"
          CURRENT="${{ steps.get_current_version.outputs.version }}"
          
          echo "Updating from $CURRENT to $LATEST"
          
          # Use sed with different delimiter for versions with dots
          sed -i "s|n8nio/n8n:${CURRENT}|n8nio/n8n:${LATEST}|g" Dockerfile
          
          # Verify update worked
          NEW_VERSION=$(grep -E 'n8nio/n8n:[0-9.]+' Dockerfile | head -1 | sed -E 's/.*n8nio\/n8n:([0-9.]+).*/\1/')
          
          if [ "$NEW_VERSION" = "$LATEST" ]; then
            echo "✅ Dockerfile successfully updated to version $LATEST"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to update Dockerfile"
            exit 1
          fi

      - name: Commit and push if Dockerfile was changed
        if: steps.update_dockerfile.outputs.updated == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Dockerfile
          git commit -m "chore: Update n8n to version ${{ steps.get_version.outputs.version }}"
          git push origin HEAD:main
          
          echo "✅ Committed and pushed to GitHub"

      - name: Push to Hugging Face Space
        if: steps.update_dockerfile.outputs.updated == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set"
            exit 1
          fi
          
          if [ -z "$HF_REPO" ]; then
            echo "::error::HF_REPO variable is not set"
            exit 1
          fi
          
          if ! echo "$HF_REPO" | grep -q "/"; then
            echo "::error::HF_REPO must be in format: username/space-name"
            exit 1
          fi
          
          # Extract owner and space name
          OWNER="${HF_REPO%%/*}"
          SPACE_NAME="${HF_REPO#*/}"
          
          echo "Pushing to Hugging Face Space: $HF_REPO"
          
          # Remove existing remote if it exists
          git remote remove space 2>/dev/null || true
          
          # Add Hugging Face remote
          git remote add space "https://${OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_REPO}"
          
          # Push to Hugging Face
          git push space HEAD:main --force
          
          echo "✅ Successfully synced to Hugging Face Space: https://huggingface.co/spaces/${HF_REPO}"
